seed: 42
paths:
  data_dir: 'data/cifar10'
  model_path: 'weights/checkpoint.pth'
# Target ~98%: WideResNet28_10 (~36M params) or WideResNet28_2 (~1.5M)
model: 'WideResNet28_2'
hyperparameters:
  epochs: 300
  batch_size: 128
  optimizer: 'SGD'
  lr: 0.05
  momentum: 0.9
  weight_decay: 5e-4
  label_smoothing: 0.0
  cutout_size: 0
  dropout: 0.3
  scheduler: 'cosine'
  lr_milestones: [60, 120, 160]
  warmup_epochs: 5
  num_workers: 8
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 4
# Phase A (0-30): RandomCrop+Flip only. Phase B (30+): RandAugment + CutMix
start_randaugment_epoch: 30
start_cutmix_epoch: 30
cutmix_alpha: 0.5
cutmix_alpha_end: 0.5
cutmix_alpha_ramp_epochs: 0
cutmix_prob: 0.25
use_amp: true
use_compile: false
use_ema: true
ema_decay: 0.999
use_tta: true
